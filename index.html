<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audioguía Oslo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #e0faf5 0%, #d8f5f0 100%);
            min-height: 100vh;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            background: linear-gradient(180deg, #e0faf5 0%, #d8f5f0 100%);
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .header-icon {
            display: inline-block;
            color: #3498db;
            padding: 0;
            border-radius: 0;
            font-size: 28px;
            margin-bottom: 10px;
        }

        h1 {
            color: #16a085;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            color: #4a9985;
            font-size: 14px;
            font-weight: 400;
        }

        /* BARRA DE PROGRESO */
        .progress-container {
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #c0e8e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #16a085 0%, #1abc9c 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .stop-counter {
            text-align: center;
            color: #4a9985;
            font-size: 13px;
            margin-top: 10px;
            font-weight: 500;
        }

        /* TARJETA PRINCIPAL */
        .stop-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 12px rgba(22, 160, 133, 0.08);
            border-left: 6px solid #16a085;
        }

        .stop-number {
            display: inline-block;
            background: #3498db;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .stop-name {
            color: #16a085;
            font-size: 26px;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 20px;
        }

        .stop-description {
            color: #4a6d6a;
            font-size: 17px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .stop-description p {
            margin-bottom: 15px;
        }

        .stop-description p:last-child {
            margin-bottom: 0;
        }

        /* INDICADOR DE REPRODUCCIÓN */
        .audio-status {
            background: #d4eef5;
            border-left: 4px solid #3498db;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            color: #2d5a8a;
            font-size: 15px;
            display: none;
            align-items: center;
        }

        .audio-status.playing {
            display: flex;
        }

        .audio-status.playing::before {
            content: '🔊';
            margin-right: 10px;
            font-size: 18px;
        }

        /* BOTONES DE AUDIO */
        .audio-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-audio {
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .btn-play {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.25);
        }

        .btn-play:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.25);
        }

        .btn-stop {
            background: #e0faf5;
            color: #3498db;
            box-shadow: 0 2px 6px rgba(22, 160, 133, 0.08);
        }

        .btn-stop:active {
            transform: translateY(1px);
        }

        .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* BOTONES DE NAVEGACIÓN */
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-nav {
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            background: white;
            color: #1a4d6d;
            border: 2px solid #d4e5e0;
            box-shadow: 0 2px 6px rgba(45, 106, 79, 0.08);
        }

        .btn-nav:active {
            transform: translateY(2px);
        }

        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #f5faf8;
        }

        /* INFO BOX */
        .info-box {
            background: #d4e8f0;
            border-left: 4px solid #1a4d6d;
            padding: 16px;
            border-radius: 10px;
            color: #2d5a7a;
            font-size: 15px;
            line-height: 1.6;
            text-align: center;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }

            h1 {
                font-size: 24px;
            }

            .stop-card {
                padding: 20px;
            }

            .stop-name {
                font-size: 22px;
            }

            .stop-description {
                font-size: 16px;
            }

            .btn-audio, .btn-nav {
                font-size: 16px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="header-icon">🎧</div>
            <h1>Audioguía Oslo</h1>
            <p class="subtitle">Tour completo de 12 paradas</p>
        </header>

        <!-- PROGRESO -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="stop-counter">
                Parada <span id="stopCounter">1</span> de 12
            </div>
        </div>

        <!-- TARJETA DE PARADA -->
        <div class="stop-card">
            <div class="stop-number" id="stopNumber">1</div>
            <h2 class="stop-name" id="stopName">Cargando...</h2>
            <div class="stop-description" id="stopDescription">
                <p>Cargando información...</p>
            </div>

            <!-- INDICADOR AUDIO -->
            <div class="audio-status" id="audioStatus">
                Reproduciendo audio...
            </div>

            <!-- BOTONES AUDIO -->
            <div class="audio-buttons">
                <button class="btn-audio btn-play" id="playBtn" onclick="playAudio()">
                    🔊 Escuchar
                </button>
                <button class="btn-audio btn-stop" id="stopBtn" onclick="stopAudio()" disabled>
                    ⏹ Parar
                </button>
            </div>

            <!-- BOTONES NAVEGACIÓN -->
            <div class="nav-buttons">
                <button class="btn-nav" id="prevBtn" onclick="previousStop()">
                    ⬅️ Anterior
                </button>
                <button class="btn-nav" id="nextBtn" onclick="nextStop()">
                    Siguiente ➡️
                </button>
            </div>
        </div>

        <!-- INFO -->
        <div class="info-box">
            ℹ️ El tour completo dura aproximadamente 75 minutos
        </div>
    </div>

    <script>
        const stops = [
            {
                number: 1,
                name: "Karl Johans Gate y el Palacio Real",
                description: `Bienvenido a Karl Johans Gate, la calle más famosa de Oslo y el corazón cultural de la ciudad. Esta avenida histórica conecta el Palacio Real con la Estación Central, recorriendo el centro de Oslo a través de tiendas, restaurantes y cafés tradicionales.<br><br>Aquí se encuentra el Palacio Real, la residencia oficial de la familia real noruega desde 1848. El edificio, construido en estilo neoclásico, es una joya de la arquitectura noruega. Durante el verano, puedes ver el cambio de guardia real, una ceremonia colorida y tradicional.<br><br>También verás el Parlamento Noruego (Stortinget), uno de los edificios más importantes del país donde se toman las decisiones políticas fundamentales. El Museo Nacional alberga la colección de arte más grande de Noruega, con obras maestras de Edvard Munch y otros artistas famosos. No te pierdas el Teatro y Museo de Ibsen, dedicado al dramaturgo noruego Henrik Ibsen, padre del teatro moderno.<br><br>Pasear por Karl Johans Gate es una experiencia inolvidable donde puedes ver la historia de Noruega en cada rincón.`
            },
            {
                number: 2,
                name: "Bogstadveien - Las Mejores Compras de Oslo",
                description: `Nos encontramos en Bogstadveien, la calle comercial más larga, exclusiva y famosa de Oslo. Se extiende desde el Palacio Real hasta el Parque Vigeland, ofreciendo más de dos kilómetros de tiendas de lujo, boutiques de diseño y galerías de arte contemporáneo.<br><br>Bogstadveien es el paraíso para encontrar ropa de diseñadores internacionales, joyerías finas, galerías de arte moderno y librerías especializadas. Aquí conviven marcas de moda noruega tradicional con las más modernas de Europa. Las tiendas van desde boutiques independientes hasta grandes casas de moda.<br><br>Además de las compras, disfrutarás de la hermosa arquitectura de los edificios históricos que rodean la calle, muchos datados del siglo XIX. Hay numerosos cafés acogedores donde puedes descansar con un café noruego auténtico mientras observas a la gente pasar. Los restaurantes locales ofrecen desde comida rápida hasta alta cocina nórdica.<br><br>En otoño e invierno, la calle se decora especialmente para las festividades navideñas, haciendo la experiencia aún más mágica. Esta es una parada obligada para los amantes del shopping y la arquitectura urbana.`
            },
            {
                number: 3,
                name: "Parque de Esculturas Vigeland - El Bebé Enojado",
                description: `Ahora visitamos el famoso Parque de Esculturas de Vigeland, uno de los parques más visitados del mundo. Este parque único contiene más de 200 esculturas de bronce y hierro fundido, todas creadas por el genio artístico del escultor Gustav Vigeland.<br><br>El parque está dividido en varias secciones temáticas, cada una representando diferentes etapas de la vida humana, desde el nacimiento hasta la vejez. La puerta de entrada, llamada 'Puerta del Infierno', es una obra maestra inspirada en Dante Alighieri que deja sin aliento a los visitantes. El Obelisco central, con 17 metros de altura, está formado por 36 figuras humanas entrelazadas, simbolizando el ciclo de la vida.<br><br>Una de las esculturas más famosas y queridas es 'Sinnataggen' - El Bebé Enojado. Esta pequeña estatua de bronce de un niño furioso es iconic de Oslo. Los visitantes la tocan tanto que sus nalgas brillan por el pulimento constante. Según la tradición local, tocar al bebé enojado trae buena suerte. Es una foto obligatoria y los turistas hacen cola para fotografiarse junto a esta pequeña obra maestra.<br><br>Vigeland Park es un lugar de contemplación, paz y reflexión. Puedes caminar libremente entre las esculturas, fotografiarlas desde diferentes ángulos y apreciar el arte desde todas las perspectivas. Es especialmente hermoso en primavera cuando florecen los árboles, en verano cuando hay exposiciones, y en invierno cuando la nieve cubre las esculturas creando un efecto mágico.<br><br>Junto al parque está el Museo Vigeland, donde puedes ver dibujos originales, modelos de barro y aprender sobre la vida del artista. El museo ofrece una comprensión profunda de la visión artística de Vigeland y su proceso creativo.`
            },
            {
                number: 4,
                name: "Museo Folclórico Noruego - Tradición Viva",
                description: `Bienvenido al Museo Folclórico Noruego (Norsk Folkemuseum), uno de los museos al aire libre más grandes y auténticos del mundo. Este museo extraordinario preserva y protege la cultura, tradiciones y forma de vida del pueblo noruego a través de los siglos.<br><br>El museo alberga más de 150 casas tradicionales, iglesias de madera y edificios históricos traídos de todas las regiones de Noruega. Caminarás por aldeas auténticas de los siglos XVII, XVIII y XIX como si viajaras en el tiempo. Las casas están completamente amuebladas exactamente como estaban hace cientos de años, con detalles auténticos.<br><br>Puedes entrar en las casas, ver cómo vivía la gente común, observar muebles antiguos tallados a mano, ropa tradicional noruega bordada, herramientas de trabajo y objetos cotidianos. Los guías en traje tradicional noruego explican con pasión la vida rural histórica y las tradiciones. En verano, hay demostraciones vivas de artesanías tradicionales: tejido en telares antiguos, carpintería, herrería, alfarería y otras habilidades casi perdidas.<br><br>La iglesia de madera de Gol, datada de 1200, es una joya arquitectónica de importancia histórica. Hay restaurantes que sirven comida tradicional noruega auténtica preparada según recetas antiguas. El museo es especialmente encantador en invierno cuando hay decoraciones navideñas y atmósfera festiva, o en verano con festivales folclóricos.`
            },
            {
                number: 5,
                name: "Fredriksuborg y Centro Holocausto - Vidkun Quisling",
                description: `Estamos en Fredriksuborg, un área histórica y elegante de Oslo que refleja la arquitectura y el desarrollo urbano del siglo XIX. Es uno de los barrios más bellos y bien preservados de la ciudad, con edificios históricos, calles arboladas y una atmósfera tranquila.<br><br>Aquí se encuentra el Centro Noruego del Holocausto, un museo educativo de gran importancia dedicado a la memoria del Holocausto. El museo es mucho más que una colección de artefactos; es un lugar de reflexión profunda, educación y conmemoración del sufrimiento humano.<br><br>El Centro documenta detalladamente el rol de Noruega durante la Segunda Guerra Mundial, la ocupación nazi alemana desde 1940 a 1945, y el destino de los judíos noruegos. Alberga testimonios personales conmovedores, fotografías históricas, documentos originales y objetos personales que cuentan historias humanas reales.<br><br>Una historia importante es la de Vidkun Quisling, un militar y político noruego que vivió en Fredriksuborg. Quisling se alió con la Alemania nazi durante la ocupación de Noruega. Su nombre se hizo sinónimo de 'traidor' en todo el mundo - en muchos idiomas 'quisling' significa traidor. Bajo su régimen títere colaboracionista, aproximadamente 770 judíos noruegos fueron deportados a campos de concentración, muchos pereciendo en el Holocausto. Quisling fue ejecutado por traición en 1945 después del fin de la guerra. Su legado es un recordatorio del peligro de la colaboración con el fascismo.<br><br>Las exhibiciones son sensibles, educativas y apropiadas para visitantes de todas las edades. El museo actúa como centro de investigación, educación y prevención del genocidio. Es un lugar importante para aprender de la historia y reflexionar sobre los derechos humanos universales.`
            },
            {
                number: 6,
                name: "Museo Kon-Tiki, Fram y Museo Marítimo",
                description: `Nos encontramos en Bygdøy, la famosa 'isla de los museos', donde convergen tres museos extraordinarios que cuentan las históricas aventuras de Noruega en el mar y la exploración.<br><br>El Museo Kon-Tiki alberga la legendaria balsa Kon-Tiki, en la que Thor Heyerdahl y su equipo navegaron desde Perú hasta la Polinesia en 1947, demostrando una teoría sobre migraciones antiguas. Ver la balsa original es absolutamente impresionante. El museo cuenta la historia completa de esta aventura legendaria que capturó la imaginación mundial. También hay exposiciones de arte de la Polinesia y artefactos arqueológicos fascinantes.<br><br>El Museo Fram contiene el barco polar histórico 'Fram', usado por el explorador Fridtjof Nansen en su expedición a través del Ártico congelado (1888-1892) y más tarde por Roald Amundsen en su búsqueda del Polo Sur. El barco original está completamente preservado en excelente estado. Puedes subir a bordo y explorar las cabinas originales, imaginar las condiciones extremas durante las expediciones polares en temperaturas bajo cero. El museo relata hazañas de exploración, supervivencia y determinación en condiciones imposibles del Ártico.<br><br>El Museo Marítimo Noruego documenta la larga y gloriosa historia de Noruega como nación marítima. Exhibe barcos históricos, modelos detallados de barcos antiguos, instrumentos de navegación primitivos y explica cómo el mar ha sido central en la vida, cultura, comercio y economía noruega durante siglos.<br><br>Estos tres museos juntos cuentan la fascinante historia de la exploración humana, el coraje marino, la innovación y la conexión profunda de Noruega con el océano.`
            },
            {
                number: 7,
                name: "Fredriksuborg y Centro Holocausto - Regreso",
                description: `Estamos nuevamente en Fredriksuborg. Si visitaste el Centro del Holocausto la primera vez y aprendiste sobre Vidkun Quisling y esta importante parte de la historia, esta es una oportunidad para explorar más profundamente la zona y reflexionar sobre lo aprendido.<br><br>Fredriksuborg ofrece mucho más que museos. Camina por las calles tranquilas y serenas, admira la elegancia de la arquitectura del siglo XIX con sus fachadas históricas bien preservadas. Hay varios cafés acogedores donde puedes disfrutar de un auténtico café noruego con pasteles tradicionales como los kanelsnurrer (espirales de canela). Los restaurantes de la zona sirven comida auténtica noruega, desde platos caseros hasta cocina moderna.<br><br>Si no tuviste tiempo antes, ahora puedes visitar los parques cercanos y relajarte en los espacios verdes tranquilos. Hay tiendas independientes con artesanía local y productos tradicionales noruegos hechos a mano. La atmósfera es tranquila, pacífica y perfecta para experimentar el ritmo de vida noruego lejos del bullicio.<br><br>En invierno, la zona se ve especialmente romántica con decoraciones navideñas y nieve. En primavera, los árboles florecidos crean una atmósfera mágica. En otoño, los colores otoñales son espectaculares. Es un lugar ideal para una pausa relajante y contemplativa durante tu tour.`
            },
            {
                number: 8,
                name: "Museo Folclórico Noruego - Regreso",
                description: `Estamos nuevamente en el Museo Folclórico Noruego. Si bajaste la primera vez, puedes profundizar aún más en la experiencia de la vida tradicional noruega y descubrir nuevas perspectivas.<br><br>Si no visitaste las casas en la primera parada, ahora es tu segunda y probablemente última oportunidad. Te recomendamos especialmente ver la iglesia de madera de Gol con su arquitectura medieval única, las granjas tradicionales con sus técnicas agrícolas antiguas, y experimentar cómo vivía la gente noruega hace cientos de años en condiciones muy diferentes a hoy.<br><br>El museo ofrece experiencias complementarias especiales: demostraciones vivas de artesanía tradicional, talleres donde aprendes técnicas antiguas directamente de artesanos, y actuaciones de música y danza folclórica noruega auténtica. El restaurante Lokkekiosken sirve comida auténtica del siglo XIX preparada con recetas históricas preservadas.<br><br>En diferentes épocas del año, el museo celebra festivales especiales: navidad medieval en invierno, festivales de verano con música en vivo, celebraciones tradicionales de midsummer. Cada visita ofrece perspectivas nuevas y diferentes. Los guías son apasionados, conocedores y comparten historias fascinantes sobre la vida rural noruega auténtica.<br><br>Este es un museo donde aprendes y disfrutas simultáneamente, conectando profundamente con las raíces culturales de Noruega.`
            },
            {
                number: 9,
                name: "Filipstad y Aker Brygge - Waterfront Moderno",
                description: `Ahora llegamos a Aker Brygge y el área de Filipstad, una transformación moderna y exitosa del histórico puerto industrial de Oslo. Este es uno de los lugares más vibrantes, modernos y cosmopolitas de la ciudad.<br><br>Aker Brygge es un desarrollo waterfront revolucionario que combina historia industrial con modernidad. Los antiguos almacenes y fábricas industriales han sido inteligentemente convertidos en apartamentos lujosos, tiendas boutique, galerías de arte contemporáneo, cines, teatros y restaurantes de clase mundial con terraza con vista al agua. Es un paseo fascinante donde puedes ver cómo la arquitectura industrial se ha reinventado exitosamente.<br><br>Filipstad es el terminal de cruceros internacionales, donde arriban cruceros de todo el mundo. El área tiene restaurantes con vistas espectaculares al fiordo, cafés al aire libre con sombrillas, y espacios para relajarse junto al agua observando barcos. Puedes ver los enormes cruceros, yates privados, barcos de vela y la vida marina activa de Oslo.<br><br>La zona es perfecta para pasear sin prisa, disfrutar de comida y bebidas gourmet, comprar souvenirs noruegos auténticos, o simplemente sentarse a contemplar el agua, las vistas de la bahía y observar la puesta de sol sobre el fiordo. Hay tiendas de artesanía local, librerías independientes, galerías de arte y anticuarios. En verano, hay eventos culturales, conciertos en vivo y festivales al aire abierto.<br><br>Aker Brygge representa el futuro moderno y sostenible de Oslo, mientras mantiene respeto y conexión con su pasado marítimo y obrero.`
            },
            {
                number: 10,
                name: "Akershus - Fortaleza, Ayuntamiento y Premio Nobel",
                description: `Visitamos Akershus, el corazón histórico y político de Oslo. Esta área icónica contiene algunos de los edificios más importantes y simbólicos de Noruega.<br><br>La Fortaleza de Akershus es una impresionante fortaleza medieval que domina el puerto de Oslo desde el año 1299, más de 700 años de historia. Su arquitectura de fortificación es espectacular, con murallas de piedra maciza, torres de vigilancia y vistas panorámicas increíbles del fiordo de Oslo y las islas. Dentro hay museos militares que documentan detalladamente la historia militar de Noruega a través de los siglos. La fortaleza es especialmente hermosa y romántica al atardecer cuando la luz dorada ilumina sus antiguas piedras.<br><br>El Ayuntamiento de Oslo es un edificio arquitectónico emblemático y distintivo con sus características torres gemelas reconocibles desde lejos. Fue completado en 1950 y es una joya de la arquitectura moderna noruega de mediados de siglo. El interior es elaboradamente decorado con arte noruego de calidad. Aquí se celebra anualmente la histórica Ceremonia del Premio Nobel de la Paz en diciembre, un evento de importancia mundial transmitido a todo el planeta.<br><br>El Centro Nobel de la Paz está ubicado dentro del Ayuntamiento, dedicado a Alfred Nobel y su legado de paz mundial. Exhibe información sobre ganadores del Premio Nobel de la Paz desde 1901 y promueve educación sobre paz, resolución de conflictos y no violencia.<br><br>El muelle histórico de Akershus es perfecto para caminar tranquilamente y disfrutar de vistas hermosas del fiordo. Hay cafés con terraza y restaurantes con especialidades de pescado fresco. El área es especialmente mágica y romántica al atardecer cuando el cielo se pinta de colores.`
            },
            {
                number: 11,
                name: "Go Nordic Cruiseline - Ferry a Dinamarca",
                description: `Estamos en la terminal de Go Nordic Cruiseline, un importante punto de conexión marítima internacional entre Noruega y el resto del mundo. Desde aquí salen ferries internacionales modernos, con destinos principales a Copenhague, Dinamarca, y otros puertos nórdicos.<br><br>Go Nordic Cruiseline ofrece viajes marítimos que combinan el transporte necesario con la experiencia de vacaciones de crucero. Los ferries son barcos modernos y completamente equipados, con camarotes cómodos, restaurantes de calidad, entretenimiento a bordo, bares y zonas de recreo. El viaje a Copenhague dura aproximadamente 19 horas, atravesando el Skagerrak y el Mar del Norte en una experiencia marítima memorable.<br><br>Este es un punto fascinante para ver tráfico marítimo internacional activo. Los ferries grandes son visualmente impresionantes de observar en los muelles. La terminal tiene tiendas duty-free, cafés, restaurantes y servicios completos para pasajeros. Si deseas una experiencia aventurera, puedes embarcar en un crucero y experimentar un viaje marítimo nórdico auténtico, viendo la vida marina y paisajes marítimos.<br><br>El área del puerto es dinámica, activa y cosmopolita, con mucho movimiento de barcos internacionales, marineros profesionales y viajeros de todo el mundo. Representa la importancia continua de Noruega como nación marítima conectada al comercio mundial.<br><br>Si eres aventurero, considera tomar un crucero a Copenhague, Kiel, o destinos del norte de Europa directamente desde esta terminal.`
            },
            {
                number: 12,
                name: "Ópera Nacional, Munch, Deichman, Catedral y Estación",
                description: `Finalizamos nuestro tour en el área cultural, arquitectónica y de transportes más importante de Oslo, con varios hitos culturales icónicos de la ciudad.<br><br>La Ópera Nacional de Noruega es un edificio arquitectónico espectacular y futurista diseñado para parecer un iceberg emergiendo del agua. Su exterior de mármol blanco puro es deslumbrante bajo el sol y reflejante por la noche. Puedes entrar y subir por las escaleras del tejado inclinado para obtener vistas panorámicas de 360 grados de Oslo y el fiordo. Es una obra maestra de arquitectura contemporánea que combina función con arte.<br><br>El Museo Munch alberga 'El Grito', la pintura más famosa de Edvard Munch y una de las obras maestras más icónicas del arte mundial. El museo exhibe la colección más grande y completa de obras de Edvard Munch. El edificio en sí es moderno, luminoso y hermoso, con vistas del puerto y el fiordo desde las ventanas.<br><br>La Biblioteca Deichman es la biblioteca pública principal de Oslo, un edificio moderno, acogedor y transparente dedicado al conocimiento, lectura y como espacio comunitario importante. Es abierta a todos y funciona como centro cultural.<br><br>La Catedral de Oslo (Oslo Domkirke) es una iglesia histórica de madera construida en el siglo XVII, con arquitectura simple pero hermosa. Su interior es un lugar de paz, contemplación y serenidad espiritual. A menudo hay conciertos de música clásica en el interior.<br><br>La Estación Central de Oslo (Oslo Sentralstasjon) es el principal hub de transporte de la ciudad, el corazón del movimiento urbano donde confluyen viajeros de todo el mundo. Es un lugar bullicioso, dinámico y energético. Desde aquí puedes conectar con trenes a cualquier parte de Noruega o Europa, metros, autobuses y taxis. La estación es arquitectónicamente importante en la ciudad.<br><br>Esta área final representa la mezcla perfecta de cultura, arquitectura moderna, historia medieval, espiritualidad y conectividad global que define al Oslo contemporáneo. ¡Felicidades por completar el tour de 12 paradas y conocer lo mejor de Oslo!`
            }

        let currentStopIndex = 0;
        let isPlaying = false;
        let utterance = null;

        function updateDisplay() {
            const stop = stops[currentStopIndex];
            
            document.getElementById('stopCounter').textContent = stop.number;
            document.getElementById('stopNumber').textContent = stop.number;
            document.getElementById('stopName').textContent = stop.name;
            document.getElementById('stopDescription').innerHTML = stop.description.replace(/\n/g, '<br>');
            
            // Actualizar barra de progreso
            const progress = (stop.number / 12) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Habilitar/deshabilitar botones
            document.getElementById('prevBtn').disabled = currentStopIndex === 0;
            document.getElementById('nextBtn').disabled = currentStopIndex === stops.length - 1;
            
            // Detener audio y reset
            stopAudio();
            
            // Scroll arriba
            window.scrollTo(0, 0);
        }

        function playAudio() {
            const stop = stops[currentStopIndex];
            const text = `${stop.name}. ${stop.description.replace(/<br>/g, ' ')}`;
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 0.95;
                utterance.pitch = 1;
                utterance.volume = 1;
                
                const statusDiv = document.getElementById('audioStatus');
                const playBtn = document.getElementById('playBtn');
                const stopBtn = document.getElementById('stopBtn');
                
                utterance.onstart = () => {
                    statusDiv.classList.add('playing');
                    isPlaying = true;
                    playBtn.disabled = true;
                    stopBtn.disabled = false;
                };
                
                utterance.onend = () => {
                    statusDiv.classList.remove('playing');
                    isPlaying = false;
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                };
                
                utterance.onerror = () => {
                    statusDiv.classList.remove('playing');
                    isPlaying = false;
                    playBtn.disabled = false;
                    stopBtn.disabled = true;
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert('Tu navegador no soporta audio en este dispositivo');
            }
        }

        function stopAudio() {
            window.speechSynthesis.cancel();
            isPlaying = false;
            document.getElementById('audioStatus').classList.remove('playing');
            document.getElementById('playBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        function nextStop() {
            if (currentStopIndex < stops.length - 1) {
                currentStopIndex++;
                updateDisplay();
            }
        }

        function previousStop() {
            if (currentStopIndex > 0) {
                currentStopIndex--;
                updateDisplay();
            }
        }

        // Inicializar
        updateDisplay();

        // Limpiar cuando se cierre
        window.addEventListener('beforeunload', () => {
            window.speechSynthesis.cancel();
        });
    </script>
</body>
</html>
